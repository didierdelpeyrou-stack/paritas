Q1_comprehension: "Plus claire qu'à la session précédente — le retrait de la silhouette sépia (commit 0813c75) libère la lecture sur 390 px. La barre 4px à gauche du choice-btn (SceneCard.svelte:525) signale la posture sans m'envahir. Compris dès le tour 4 que mes choix étaient typés (rupture / institution / compromis / expertise / opinion) parce que j'ai pu LIRE le texte sans calque qui le mange."
Q2_plaisir: "Le sceau de cire à 44×44 (CockpitDashboardBar.svelte:350-351) est mon objet préféré du jeu. Diégétique, pulse 1.4s, tactile-conforme. Le seul élément du shell qui respecte WCAG 2.5.5. C'est la cible que mon pouce trouve sans regarder."
Q3_friction: "Tour 3 — j'ouvre le burger. Le sys-btn fait 28×28 (CockpitTopHeader.svelte:622). Ma cible ratée 3 fois sur 5. Pas une frustration esthétique : une frustration physique. Mon pouce mesure 16-19mm, la cible mesure 8mm."
Q4_confusion: "Le coh-flag ⚠ sur certains choix (SceneCard.svelte:411-415). Je vois le pictogramme, je le tape — il ne fait rien (cursor: help, title=...). Sur tactile, title= est mort. Pendant 31 tours cumulés, je n'ai jamais su qu'il signalait 'choix opposé à ton trait dominant'."
Q5_memoire: "Tour 5 partie 2 — un événement causal apparaît dans le ticker, lié à un choix que j'avais fait au tour 1 (ORDA-013/014 — 13 callbacks branchés). Surprise positive. Le ticker pulse 'fresh' 1.6s × 3 (NewsTicker.svelte:337-343). Subtil, juste, lisible même sur 22 px de hauteur."
Q6_equite: "Le badge POV à SceneCard.svelte:296-311 affiche honnêtement quand un scénario est cadré du point de vue du camp adverse. C'est rare dans le jeu — assumer que la vue n'est pas neutre. Soueidan apprécierait. Mais : sur 390 px le badge est petit (font-size 0.62rem) et son title= est inaccessible tactile."
Q7_beaute: "Le Cinzel sur l'ère 'Trente Glorieuses' avec data-epoque='compromis-social' (CockpitShell.svelte:749-756) — bleu institutionnel #1E5C8A en deep. Sur 390 px le tag --epoque-tone reste lisible. La typographie tient le mobile, c'est rare."
Q8_progression: "Mauvais signal P0 — si je force Théâtre depuis le menu burger sur 390 px, le TheatreActionsPanel.svelte:401-403 fait display:none, et il n'y a pas de remplaçant rendu (le .theatre-actions-trigger CSS à CockpitShell.svelte:952 est orphelin, jamais utilisé en HTML). Trou structurel. Si un user débutant joue avec le LayoutSwitcher, il perd toutes les actions libres et ne sait pas pourquoi."
Q9_nps: "7. Avant le commit 0813c75 j'aurais dit 5. Le fix UX plume vaut +2. Le coh-flag tactile-mort vaut −1. Le tap-target sub-44 systémique vaut −1.5. Si un panel de 30 testeurs Carnet score similaire, NPS ≈ 6.5 mobile, 8 desktop."
Q10_fix_unique: "Long-press universel sur tous les éléments avec title=. Aujourd'hui le longPress action existe (src/lib/actions/longPress.ts) mais n'est utilisé QUE sur les res-chip (CockpitTopHeader.svelte:278). Étendre à : .coh-flag (SceneCard.svelte:411-415), .pov-badge (SceneCard.svelte:296-311), .ability-hint (SceneCard.svelte:444-453), tous les boutons du ticker interactif. Coût : ~30 use:longPress disséminés. Effet : une moitié de la sémantique cachée sur tactile devient accessible."
