Q1: "À 0:30, mes yeux sont sur le SceneCard central (CockpitShell.svelte:410). Le hint 'how-to-play' (CockpitShell.svelte:388) m'oriente vers les boutons de choix — bon réflexe code, mais sur 1440px les actions sont à gauche (TheatreActionsPanel) et la scène au centre : double zone d'attention, je cherche."
