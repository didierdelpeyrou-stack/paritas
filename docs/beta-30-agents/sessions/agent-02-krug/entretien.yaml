Q3: "Le choix au tour 9 dans Confrontation (Confrontation.svelte, 948 lignes) : 4 boutons d'argument, pas de feedforward des effets. J'ai cliqué au feeling et regretté. Soren Johnson aurait râlé."
Q4: "Le sceau de cire qui pulse (8s) sur le bouton de validation des ateliers — diégétique, lent, juste. Et le portrait de Frachon en laiton à gauche du dialogue. Présence physique."
Q5: "Le ToastStack en cahier-de-doléances ère Révolution (ToastStack.svelte:247-261) — le toast ne ressemble pas à un toast. C'est ÇA, le clic-révélation. Lucas Pope serait fier."
Q6: "La densité des 7 jauges du CockpitTopHeader sans hiérarchie. Je ne sais pas laquelle regarder en premier. Et la dette CSS Confrontation (ORDA-006, reportée 5 fois selon les bulletins ORDA-013/014) : 948 lignes, on le sent."
Q7: "Oui — pour tester le camp patron. Mais pas pour réessayer le mode Réfléchi : je relancerais en mode Compulsif pour voir si l'urgence émotionnelle compense la friction d'horizon."
Q8: "À un prof de SES de Terminale, oui. À ma nièce de 16 ans, non — pas avant qu'on ait fixé le compteur 'Tour N/100' visible dès le tour 1. La friction d'horizon est un dealbreaker pour les ados."
Q9: "Le rôle exact des 7 ressources entre elles. Je vois 'cohésionInterne' et 'légitimité' bouger en parallèle, je ne sais pas si elles sont corrélées par design ou indépendantes. Le glossaire (GLOSSARY) les définit isolément, pas leurs interactions."
Q10: "Le ToastStack diégétique. Un toast qui change de support selon l'ère (cahier de doléances → télégramme → fax) — je n'avais jamais vu ça dans un serious game. Ne touche pas. Étends-le aux modales."
