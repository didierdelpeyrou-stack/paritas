Q1: "Premier geste : `grep -rn Math.random src/game/`. Je ne joue pas, je lis. La doctrine ORDA-008 §III dit RNG seedé partout — je veux vérifier l'invariant avant de jouer la simulation."
Q2: "Tour 4 — quand j'ai compris que `engine.ts:316-359` (computeSatisfaction) est un produit scalaire pondéré pur. Σ_t (min(themes[t]/demand_t, 1)) × poids_t. Bornes [0,1], déterministe sur themes+postures. Le noyau est mathématiquement honnête. À partir de là je sais comment le système peut tomber : par les couches stochastiques au-dessus, pas par le calcul de signature."
Q3: "Le choix de relâcher le test `accord_majoritaire >= 1%` à `>=0%` en ORDA-010 (engine.test.ts) puis de le restaurer en ORDA-011 grâce à la contagion CFE-CGC (engine.ts:902-910). L'aveu du test relâché, écrit dans le code et dans le bulletin — c'est de l'honnêteté. Mais il a fallu 1.5 j-h supplémentaires et un fix non-trivial pour le racheter. Coût caché de la 4e union."
Q4: "La fonction `fuelMultiplier` à `resourceUtility.ts:191-194`. Six lignes, affine, bornée, pente documentée, image [0.80,1.20] symétrique autour de 1. Une jolie petite équation. Économique. Honnête sur sa portée — 'levier lisible, pas un game-changer' (commentaire ligne 190)."
Q5: "Le bulletin ORDA-011 §II.B-15-recal-emp avec le diff before/after du tri par poids vs. tri par gap. C'est exactement comment on présente un fix mathématique en publication : on montre l'équation cassée, on montre l'équation corrigée, on montre la table des outcomes avant/après (31.6 % → 0 % → 31.3 %). Argus écrit comme un mathématicien."
Q6: "scoring.ts:8-23 — `cohesion * 0.45 + construction + resistance + mandate * 0.18 - malus`. Cinq termes hétérogènes, deux pondérations magiques (0.45, 0.18), une construction non plafonnée, un clamp final qui rattrape l'incohérence dimensionnelle. Aucun commentaire. Pour un score affiché au joueur, c'est trop opaque. Cf. retour panel cité dans `resourceUtility.ts:153` (5 voix convergentes : 'score = boîte noire')."
Q7: "Oui — pour vérifier que la NAO MC TPE/PME (preset 24 pts / 3 séances) tient ses cibles. Je n'ai pas eu le temps de relancer le MC avec preset='tpe-pme' — le script ne paramètre pas le preset (cf. orda-001-nao-mc.mjs:23 : `startNaoSession()` sans argument). Ça aussi devrait être seedé ET paramétrable."
Q8: "À mes étudiants de master modélisation. Pour leur montrer comment la calibration multi-agents fonctionne en pratique — distribution cible, MC 10000 parties, fixs itératifs, test relâché documenté, recalibrage ciblé. C'est de l'ingénierie de modèle exemplaire — à ceci près que la NAO n'est pas reproductible, ce que je leur dirais aussi."
Q9: "Pourquoi `mandate * 0.18` dans computeFinalScore ? Et pourquoi `construction` n'est-il pas normalisé en [0,100] avant pondération ? Si quelqu'un a la note de calibration, je veux la lire. Sinon ces coefficients sont à documenter — ou à dériver d'un principe (par ex. : tous les termes en [0,100] avec poids sommant à 1)."
Q10: "La structure ORDA. Sept cycles dans une journée, chaque cycle clôturé par un bulletin avec table avant/après et plan du suivant. Cycle court honoré à 64 % de sous-consommation cumulée. C'est un rythme de mathématicien qui sait écrire — un théorème par jour, et chaque théorème renforce les précédents. Argus tient. Ne touchez pas la cadence."
