Q1_premiere_impression: |
  C'est PROPORTIONNEL. Pas de framework boursouflé, pas d'abstraction
  performative. Svelte 5 runes utilisées comme primitives, pas comme
  liturgie. 87 composants pour 67k LoC, c'est dense mais lisible. Le
  séparation src/game/engine (pure) vs src/components (UI réactif) est
  faite avec rigueur — dans la plupart des fichiers.

Q2_moment_marquant: |
  Ligne 146-158 de src/game/engine/consequenceEngine.ts : scheduleActorCallback
  est une void function qui mute son argument (memory.scheduledActorCallbacks.push).
  Pendant ce temps choiceResolver.ts:5 clame en commentaire « Pure function ».
  L'écart entre l'intention déclarée et la réalité, en moins de 200 LoC.

Q3_moment_decrochage: |
  CockpitShell.svelte, 1491 lignes. Pas un god-object — c'est pire,
  c'est un god-SHELL : il orchestre trois identités visuelles
  (théâtre/atelier/carnet) via des branches if-isTheatre/if-isAtelier
  internes. Le découpage à faire en 3 fichiers + une CockpitFrame
  partagée est évident, et pas fait. Maintenant il se fait à reculons.

Q4_perf_observee: |
  Le tick (continueAfterConsequence ligne 371-389 de gameState.svelte.ts)
  enchaîne 7 passes pures qui chacune réalloue un nouveau RebirthGameState
  via spread {...state, x:y}. Pour 100 tours × 2 parties = 1400 allocations
  intermédiaires. Pas un drame — V8 nettoie, allocations courtes durée.
  Mais un applyTick(state) unique qui ferait les 7 en un seul objet final
  économiserait ~85% des intermédiaires. Graisse, pas hémorragie.

Q5_god_object_check: |
  gameState.svelte.ts à 1061 lignes : ce N'EST PAS un god-object au
  sens classique. C'est un store-coordinator. Le calcul est DÉLÉGUÉ
  aux engines purs (engine/, simulation/, org/, strategy/, ai/).
  Le store coordonne 10 phases (idle/scene/consequence/matignon/laplace/
  ended/...) et persiste. Ce qui pue, c'est la duplication entre
  choose() / resolveMatignon() / resolveLaPlace() : trois implémentations
  parallèles de « j'applique des deltas, je passe en phase consequence ».

