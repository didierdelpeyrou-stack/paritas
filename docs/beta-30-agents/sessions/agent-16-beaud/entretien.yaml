Q1: "J'ai cherché le scénario Florange dans la liste des époques. Pas trouvé. Rabattu sur Croizat 1945. Premier geste : déçu avant d'avoir cliqué."
Q2: "Tour 4. Quand le premier callback différé est tombé (refus de compromis → adversaire à T+4, choiceResolver.ts:85), j'ai compris la promesse CK3 : un choix maintenant produit un écho dans 3-5 tours. La boucle est lisible."
Q3: "Choix Seillière 2001 : claquer la porte (persona.ts:127) ou rester (persona.ts:145). Pas pour le dilemme — pour le flag. 'epuise-mouvement' sur un geste patronal m'a fait douter du modèle. J'ai cliqué quand même pour vérifier le callback."
Q4: "Frachon. Pas pour le scénario Matignon — pour les deux lignes qu'il m'écrit à T+5 (choiceResolver.ts:110-113). 'Le 7 juin restera. Tu as bien fait.' C'est concret, c'est daté, c'est l'écriture d'un dirigeant qui n'écrit pas beaucoup. Je l'ai vu plier la lettre."
Q5: "La phrase de Billancourt sur Grenelle : '35% du SMIG, c'est bien. Mais ce n'est pas la révolution.' (choiceResolver.ts:123). Le SMIG dans la bouche de la base, c'est juste. Ça pèse exactement ce qu'a pesé la déception de mai-juin 1968 dans les bouches OS."
Q6: "Trois fois le même 'trois militants démissionnent sans bruit' (choiceResolver.ts:155). À la première, ça serre. À la troisième, ça décroche. Et je n'apprends jamais qui démissionne, où, pourquoi — pas une section, pas un nom, pas un atelier."
Q7: "Oui — pour rejouer en patron et tester si epuise-mouvement (persona.ts:142, patron.ts:156) déclenche le même texte 'permanences vides' du côté MEDEF. C'est le cas. C'est le bug à signaler en priorité."
Q8: "À une collègue qui travaille sur la désaffiliation syndicale post-2000. Je lui dirais : joue jusqu'à 2017, regarde le contenu Florange/Goodyear/Whirlpool — il manque. Tu verras ce qui n'est pas écrit."
Q9: "Pourquoi le champ 'patience' de la base (actors.ts:10) a la même unité que la patience du patronat ou de l'État (actors.ts:11-13). L'usure d'un OS de Florange n'a pas la même mécanique que la patience d'un négociateur Medef. Le modèle léger 4-acteurs aplatit."
Q10: "Le callback Frachon de Matignon (choiceResolver.ts:107-113). Date implicite, geste physique (plier la lettre), nom propre, deux phrases. C'est le seul endroit où la mémoire CK3 atteint le grade promis. Ne touche pas — c'est le standard à généraliser."
