Q1: "Premier geste — j'ai cliqué sur 'Atelier NAO' parce que c'est mon objet d'étude. Le launcher 3-modes (pédago/équilibré/littéraire) est intelligent : j'ai pris équilibré pour ne pas être infantilisée."
Q2: "Tour 4 — quand j'ai vu que poser 'Communication RH' (employeur) faisait basculer la CGT de pression à patience (nao/engine.ts:163). C'est exactement ce que les DRH font quand ils contournent les radicaux par des canaux RH directs. La causalité sociologique a pris à ce moment-là."
Q3: "L'arbitrage NAO TPE-PME séance 2 : continuer sur les salaires (FO) ou ouvrir le télétravail (CFE-CGC) ? Avec 9 pts/séance je ne pouvais pas tout faire. J'ai choisi salaires, j'ai perdu CFE-CGC, j'ai eu un PV. Décision sociologiquement juste mais ludiquement frustrante."
Q4: "Ambroise Croizat (callback +5 sur cree-secu, ORDA-014). Pas pour le dialogue — pour l'idée que mes choix peuvent réveiller un acteur 5 tours plus tard. C'est CK3-grade et c'est NEUF dans un jeu pédagogique."
Q5: "La distribution NAO restituée à 31.3/44.7/18.4/5.6 % (ORDA-011). Aucun outcome dégénéré. Aucun outcome triomphal. C'est le réel français, pas une fable. Argus a tenu le seuil 'pas d'outcome ≥60%' au pourcent près — je salue."
Q6: "L'absence du critère de représentativité (loi 2008 — 10% en CSE pour signer seul, 30% pour majorité d'engagement, 50% pour droit d'opposition). Le jeu utilise un seuil unique 50% (engine.ts:102), ce qui simplifie une réalité plus stratifiée. Pour un public DRH/IRP cela manquera."
Q7: "Oui — pour rejouer la NAO en preset TPE-PME en variant l'ordre des tactiques. La rejouabilité sociologique est élevée : chaque seed produit une dynamique intersyndicale différente."
Q8: "À mes étudiants de M2 sociologie du travail. Pas comme exercice noté — comme déclencheur de discussion. La mécanique pour expliquer en 30 min ce qu'un cours magistral peine à faire en 2h : la coalition CFDT+FO comme pivot du paritarisme post-2017."
Q9: "Pourquoi la CFE-CGC démarre toujours en 'patience' à la séance 1 (engine.ts:911-914) ? Le commentaire dit 'profil cadre — on observe avant de signer' mais c'est un choix narratif. En réalité la CFE-CGC peut très bien ouvrir en pression si le projet télétravail est insuffisant. Ce n'est pas un bug, c'est une simplification — mais elle mériterait d'être documentée comme telle dans le glossaire."
Q10: "Le couplage intersyndical CGT-en-retrait → CFDT/FO 50% (engine.ts:843-845, 869). C'est huit lignes de code mais c'est 30 ans de littérature sur la solidarité revendicative française. Ne touche pas. Et la contagion finale CFE-CGC (engine.ts:902-910) — 'ne signe pas seule contre les 3 confédérations majeures' — est exactement la note de Béthoux/Jobert sur la légitimité catégorielle."
