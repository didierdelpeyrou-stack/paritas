Q1: "J'ai cliqué 'jouer', choisi côté salarié, légendaire Jouhaux. Geste fluide. Mais j'ai cherché un onglet 'syndicats hors confédérations' — pas trouvé. C'est l'angle mort que je connaissais en venant."
Q2: "Tour 4. Quand j'ai vu UNION_META.cgt avec seuilAccord 0.62 (engine.ts:127) vs 0.55 pour CFDT/FO/CFE-CGC — j'ai compris que la CGT n'était pas aplatie. La singularité est codée, pas seulement scénarisée."
Q3: "Tour 25 — choisir fo-rejoindre-jouhaux (belle-epoque.ts:228-244) en tant que membre du bureau confédéral CGT. Le scénario est premium, le historicalContext (ligne 204) cite Ramadier, l'OIT, le PCF qui quitte le gouvernement en mai 1947. Le jeu m'a fait incarner Jouhaux *vraiment*, pas un avatar."
Q4: "Frachon, parce qu'il revient dans le ticker tour 9 via callback signe-matignon (choiceResolver.ts:107-114) : « Le 7 juin restera. Tu as bien fait. » Frachon est PCF, c'est lui qui sera l'autre côté de la scission 1947. Le jeu installe la dette CGT-PCF avec deux lignes."
Q5: "Le callback fonde-fo tour +5 (choiceResolver.ts:127-134) : « L'attaque s'installe pour quarante ans. » Le jeu n'arrondit pas : Jouhaux a effectivement reçu de l'argent du Free Trade Union Committee de l'AFL (Lovestone). Le jeu *cite* sans valider, ce qui est juste."
Q6: "Pipeline rupture stages 3-5 (pipelineContentData.ts:834-958) — texte brillant sur la scission générique, mais zéro nom propre post-1968. Pas de SUD-PTT 1989, pas de Sud-Rail 1995, pas de Solidaires Unitaires Démocratiques 1998. La rupture est celle de Jouhaux, pas celle d'Annick Coupé."
Q7: "Oui — je veux retester en patron CGPF avec matignon-jouer-division-cgt (1936-matignon.ts:245) puis essayer de tenir jusqu'aux ordonnances 2017 (refondation-paritaire, choiceResolver.ts:143). Et je veux savoir si une troisième course en CFDT-Maire post-1988 a la même densité."
Q8: "À une étudiante de M2 socio du travail à Lyon 2. Pour le clivage signe-grenelle/refuse-compromis (choiceResolver.ts:119, 83) qui force l'étudiante à *choisir* entre l'accord pâle et le pv de désaccord. Mieux que mes TD."
Q9: "Le couplage intersyndical de l'IA NAO (engine.ts:843 cgtEnRetrait + 0.50 proba CFDT, ligne 869 foSuitCgt 0.50) — je l'ai compris en lisant le code. Un joueur ne le verra pas : il faudrait un encart in-game « la CFDT a suivi la CGT en retrait — solidarité de classe ou calcul ? »."
Q10: "Le sérieux historique du scénario scission-fo-1947 (belle-epoque.ts:194-280). Trois choix réalistes (Jouhaux, entrisme minoritaire, ligne Frachon-PCF), pas de fausse symétrie, traitShift cohérent. Si Paritas s'arrêtait à ce scénario, ce serait déjà un outil pédagogique sérieux."
