      dismissable, 1ère séance). Les 6 autres ateliers (LaTable, LaPlace,
      LaGreve, LesElections, Confrontation, Matignon) n'en ont pas. Le tag
      "ATELIER · LA RUE" + titre poétique "La Place" (LaPlace.svelte:88-90)
      ne suffit pas — un joueur découvre la mécanique en cliquant au hasard.
    fix: |
      Cloner le pattern NAO sur chaque atelier. localStorage clé par atelier
      (paritas_<atelier>_tuto_seen, cf NaoSimulation.svelte:209). Estimation
      6 × 30 min = 3h.
