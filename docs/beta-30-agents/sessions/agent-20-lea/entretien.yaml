Q1: "L'écran d'accueil j'ai trouvé direct. Le bouton Entrer est là. Pas de friction. C'est mieux que l'app Carrefour Workforce."
Q2: "Tour 7. La causalité jauges/choix s'est solidifiée à Matignon — j'ai vu le sceau, j'ai compris que le flag se posait, et j'ai relié au top-header."
Q3: "Atelier NAO, choix de répartir le budget de 13 pts sur 4 thèmes. J'ai mis 0 sur télétravail (par cohérence avec ma vraie vie de caissière), l'IA a pas aimé : la CFE-CGC ne signait plus (engine.ts:154, poids 40 %). Je n'avais pas anticipé que le moteur me forcerait à donner du télétravail à un syndicat de cadres pour faire passer un accord majoritaire. Pénible."
Q4: "Marylise Léon (futur.ts:46) — la citation sur l'algorithme comme politique RH. C'est juste, c'est récent, c'est moi. Et Frachon, mais lui c'est l'image."
Q5: "futur.ts:35 — la phrase Carrefour/Mosaic/70 000 caissiers. Le jeu m'a vue. Trente secondes de reconnaissance. Le sceau de Matignon aussi en pur visuel."
Q6: "engine.ts:108-112 — la grille NAO à 4 thèmes 'salaires/primes/télétravail/égalité pro' qui prétend modéliser MA NAO mais oublie planning, pénibilité, coupures, temps partiel subi. C'est une NAO de col blanc."
Q7: "Oui, une troisième fois — pour tester un préset 'distribution' s'il existait. Côté patron une fois m'a suffi, c'est pas ma table."
Q8: "À mes collègues du magasin, oui — mais en leur disant 'saute les ateliers du 19e siècle, fonce sur Matignon et sur futur.ts:21 (algorithmisation)'. À mon délégué CFDT, plutôt non — il dirait 'la NAO du jeu c'est pas la nôtre'."
Q9: "Le flag 'signe-matignon' posé en 1936-matignon.ts:117 — il n'est lu nulle part ailleurs (j'ai grep). Pourquoi le poser si aucun scénario contemporain ne s'en souvient ? Soit c'est un bug, soit c'est une promesse non tenue. Et la NAO côté patron : où sont les campText comme à Matignon ?"
Q10: "futur.ts:35 — ne touche pas à la phrase Carrefour/Mosaic/70 000 caissiers. C'est la seule fois où le jeu m'a vue. Et le sceau de cire à Matignon, intact."
