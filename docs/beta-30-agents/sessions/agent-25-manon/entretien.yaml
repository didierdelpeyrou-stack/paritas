Q1: "J'ai lu le commit 0813c75 avant tout — 170 lignes virées contre 21 ajoutées sur ScenePreviewOverlay+SceneCard, c'est l'arbitrage product que je voulais voir. Puis j'ai cliqué Jouhaux/syndical pour la partie Réfléchi. Le portrait + drapeau organisation suffisent à choisir, pas de menu nested."
Q2: "Tour 6 environ. La triade barre-accent-4px (SceneCard.svelte:525) + label CINZEL coloré (SceneCard.svelte:805-811) + glyph en cercle (SceneCard.svelte:776-792) — trois signaux redondants pour le type de choix. La redondance est exactement ce qui rend le choix lisible sans que je relise 3 fois."
Q3: "Tour 14 partie Compulsif — refuser un compromis-CGPF alors que mon trait dominant 'paternaliste' était à +3. La coh-flag ⚠ opposed (SceneCard.svelte:411-413) m'a dit 'ce choix te tend' avec un cerclage rouge sur la card. Le système m'a *informée* que je m'apprêtais à me trahir, sans m'empêcher de le faire. CK3-grade."
Q4: "Léon Jouhaux — moins par incarnation que par contraste : son portrait dans le right rail TheatrePersonalityPanel reste *présent* tout au long, et le mode Théâtre supprime le NewsTicker (CockpitShell.svelte:327-329) pour qu'il reste le centre de gravité. Le portrait omniprésent CK3 est tenu."
Q5: "L'identity anchor en mode Compulsif (SceneCard.svelte:262-267, 325-329). Une ligne italique Cinzel rgba(244,213,140,0.78), séparée du setup par un filet doré 1px. Format court pour ma dyslexie, contenu sensoriel pour mon goût Disco Elysium. Le meilleur élément du jeu."
Q6: "Le creux T15-T22 partie Réfléchi : le top-header dense + le ticker qui défile + les 7 jauges, mon TDAH a décroché. Et les ability-hint 'EFFETS +12%' (SceneCard.svelte:444-453) cryptiques sans hover — sur tactile c'est inaccessible."
Q7: "Oui — j'ai relancé en patron Seillière pour tester l'asymétrie POV. Le pov-badge (SceneCard.svelte:296-311) qui annonce 'Vue patronale / Vue syndicale / Scène commune cadrée depuis ton camp' est une signature éditoriale honnête. C'est le genre de détail qu'on garde 6 mois après avoir lâché un jeu."
Q8: "À une cliente UX-design qui doute que le 'serious game' soit un format sérieux. La cohérence typo Cinzel/Source Serif 4 (app.css:130, 145-147) + les tokens d'époque par CSS variables (CockpitShell.svelte:733-772) prouvent qu'un studio peut tenir une identité éditoriale sans Material Design. C'est du référencé."
Q9: "Le ratio des 3 indices visuels du choix : barre 4px + label + glyph. Le commit message (0813c75) le formalise comme 'trois indices redondants discrets'. La redondance = robustesse daltoniens + distraits + dyslexiques. À documenter dans un README design-system pour que les futurs composants reprennent la grammaire."
Q10: "La discipline du commit 0813c75 : voir une capture, identifier que la silhouette sépia + filigrane Cinzel saturent le card, virer 170 lignes, garder 21. Le dev a préféré la lisibilité à la richesse. C'est ce qui classe Paritas comme jeu *dirigé*, pas comme jeu accumulé. Indé-grade."
