fix_prioritaire: "src/game/engine/choiceResolver.ts:178-193 — ajouter deux blocs callback symétriques pour les flags du side event Mitbestimmung. Si `mitbestimmung-presented` : T+12, acteur=base, message Maastricht/CE européen ratifié, le mot Mitbestimmung resurgit dans une AG CFDT. Si `cogestion-rejetee` : T+8, acteur=etat, communiqué officiel rappelant que la France a refusé la directive 'comité d'entreprise européen' en 1994. Coût : 30 lignes. Bénéfice : le miroir comparatiste devient persistant, pas décoratif."
biais_reconnu: "Centrisme germanique. Je voulais voir Mitbestimmung partout — dans la NAO, dans Matignon, dans les élections professionnelles. Le jeu n'est pas un comparatif systématique, c'est un jeu sur LA France. J'ai sous-noté la finesse française du pluralisme à 4 confédérations (engine.ts:122-156) parce que ça ne 'ressemble' pas à mon DGB unitaire. À mi-parcours, j'ai compris que le paritarisme français est un autre système, pas un Mitbestimmung incomplet."
