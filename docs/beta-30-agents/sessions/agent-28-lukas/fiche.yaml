moment_marquant: "Tour 67, side event Mitbestimmung 1992 (sideEvents.ts:466-516). La carte de visite à deux faces de Klaus, et la phrase 'Vous croyez encore qu'il faut être dehors pour être libre ?' touche très juste le centre de la spécificité française : l'autonomie syndicale (Charte d'Amiens 1906) versus l'intégration cogestionnaire allemande. Dramaturgie parfaite."
moment_decrochage: "Le flag `mitbestimmung-presented` (sideEvents.ts:501) et `cogestion-rejetee` (sideEvents.ts:488) ne sont JAMAIS rappelés par scheduleActorCallback (choiceResolver.ts a 13 callbacks dont cgpf-cogestion ligne 178, mais rien sur les flags du side event 1992). L'événement s'évapore — le joueur salarié n'entend pas l'écho de son choix anti-cogestion vingt tours plus tard. Asymétrie frustrante : le patron a un callback, le salarié non."
