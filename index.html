<!doctype html>
<html lang="fr" data-a11y-contrast="standard">
  <head>
    <meta charset="UTF-8" />
    <!-- Bootstrap a11y · applique les préférences AVANT le rendu -->
    <script>
      (function() {
        try {
          var r = document.documentElement;
          var p = JSON.parse(localStorage.getItem('paritas-a11y-prefs') || '{}');
          if (p.contrast) r.dataset.a11yContrast = p.contrast;
          if (p.fontFamily && p.fontFamily !== 'standard') r.dataset.a11yFontFamily = p.fontFamily;
          if (p.colorBlind && p.colorBlind !== 'none') r.dataset.a11yColorBlind = p.colorBlind;
          if (p.reducedMotion) r.dataset.a11yReducedMotion = 'true';
          if (p.focus === 'enhanced') r.dataset.a11yFocus = 'enhanced';
          if (p.falc) r.dataset.a11yFalc = 'true';
          if (p.fontSize) r.style.setProperty('--a11y-font-scale', String(p.fontSize));
          var g = JSON.parse(localStorage.getItem('paritas-game-prefs') || '{}');
          if (g.mode === 'jour') r.dataset.gameMode = 'jour';
          if (g.density && g.density !== 'standard') r.dataset.gameDensity = g.density;
          if (g.panelSide === 'gauche') r.dataset.gamePanelSide = 'gauche';
        } catch(e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0d1014" />
    <!-- Cache-control : index.html ne doit JAMAIS être servi depuis
         le cache browser. Les bundles JS/CSS ont leur hash de
         contenu géré par Vite, ils peuvent rester en cache long. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Paritas : la table des Ateliers</title>
    <meta name="description" content="Paritas : la table des Ateliers. Une simulation politique narrative sur le paritarisme français, de 1789 à 2026. 100 décisions, deux camps, des fins multiples." />
    <meta property="og:title" content="Paritas : la table des Ateliers" />
    <meta property="og:description" content="Une simulation politique narrative sur le paritarisme français, de 1789 à 2026. 100 décisions, deux camps, des fins multiples." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Paritas : la table des Ateliers" />
    <meta name="twitter:description" content="Une simulation politique narrative sur le paritarisme français, de 1789 à 2026." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
