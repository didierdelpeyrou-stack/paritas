<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#080808" />

    <title>Matignon 1936 — Atelier PARITAS</title>
    <meta name="description" content="PARITAS · Atelier Matignon 1936 — La table des accords. Négociation 3 phases." />
      <script>
      (function() {
        try {
          var p = JSON.parse(localStorage.getItem('paritas-a11y-prefs') || '{}');
          var r = document.documentElement;
          if (p.contrast) r.dataset.a11yContrast = p.contrast;
          if (p.fontFamily && p.fontFamily !== 'standard') r.dataset.a11yFontFamily = p.fontFamily;
          if (p.colorBlind && p.colorBlind !== 'none') r.dataset.a11yColorBlind = p.colorBlind;
          if (p.reducedMotion) r.dataset.a11yReducedMotion = 'true';
          if (p.focus === 'enhanced') r.dataset.a11yFocus = 'enhanced';
          if (p.falc) r.dataset.a11yFalc = 'true';
          if (p.fontSize) r.style.setProperty('--a11y-font-scale', String(p.fontSize));
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="atelier-root"></div>
    <script type="module" src="../../src/ateliers/matignon-main.ts"></script>
  </body>
</html>
